{% extends 'tracking_app/main.html' %}
{% load static %}
{% block content %}

<div class="container mt-4">
  <h1>Project List</h1>
  <button class="btn btn-sm btn-primary">Add Project</button>
  <hr />

  <div class="row g-3">
    {% for project in project %}
      <div class="col-12 col-md-6 col-lg-4">
        {% include 'tracking_app/partials/_project_card.html' %}
      </div>
    {% empty %}
      <p>No projects found.</p>
    {% endfor %}
  </div>
</div>

{% endblock %}
