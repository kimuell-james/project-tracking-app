<div class="accordion" id="phaseAccordion">
  <div class="accordion-item">
    <h2 class="accordion-header" id="heading{{ phase.id }}">
      <button
        class="accordion-button"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#collapse{{ phase.id }}"
        aria-expanded="true"
        aria-controls="collapse{{ phase.id }}"
      >
        <div class="d-flex align-items-center gap-3">
          <strong>{{ phase.name }}</strong> <span> | </span>
          <strong class="phase-progress-text" data-phase-id="{{ phase.id }}"
            >{{ phase.get_progress }}%</strong
          >
        </div>

        <div
          class="progress mb-0"
          style="max-width: 250px; width: 100%; height: 12px"
        >
          <div
            class="progress-bar phase-progress-bar"
            data-phase-id="{{ phase.id }}"
            style="width: {{ phase.get_progress }}%;"
          ></div>
        </div>
      </button>
    </h2>

    <div
      id="collapse{{ phase.id }}"
      class="accordion-collapse collapse"
      data-bs-parent="#accordionExample"
    >
      <div class="accordion-body p-0">
        <ul class="list-group list-group-flush">
          <!-- prettier-ignore -->
          {% for task in phase.tasks.all %} 
    
          {% include 'tracking_app/partials/_task_item.html' with task=task %} 

          {% empty %}
          <li class="list-group-item text-muted">No tasks yet</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
