<li class="list-group-item d-flex align-items-center gap-3">
  <!-- Checkbox -->
  <!-- prettier-ignore -->
  <input class="form-check-input task-checkbox" type="checkbox" data-task-id="{{ task.id }}" {% if task.status == "completed" %}checked{% endif %}/>

  <!-- Task Title -->
  <span class="fw-semibold task-title" data-task-id="{{ task.id }}">
    {{ task.title }}
  </span>

  <!-- Separator -->
  <span class="text-muted">|</span>

  <!-- Description -->
  <span class="text-muted">
    {{ task.description|default:"No description" }}
  </span>
</li>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".task-checkbox").forEach((cb) => {
      cb.addEventListener("change", function () {
        const taskId = this.dataset.taskId;
        const isChecked = this.checked; // ✅ capture BEFORE request

        fetch(`/task/toggle/${taskId}/?value=${isChecked}`)
          .then((res) => res.json())
          .then((data) => {
            // ✅ force correct state from backend
            this.checked = data.status === "completed";

            // update project progress safely
            const bar = document.getElementById("project-progress-bar");
            const text = document.getElementById("project-progress-text");

            if (bar) bar.style.width = data.project_progress + "%";
            if (text) text.innerText = data.project_progress + "%";

            const phaseBars = document.querySelectorAll(".phase-progress-bar");
            const phaseTexts = document.querySelectorAll(
              ".phase-progress-text",
            );

            phaseBars.forEach((bar) => {
              if (bar.dataset.phaseId == data.phase_id) {
                bar.style.width = data.phase_progress + "%";
              }
            });

            phaseTexts.forEach((text) => {
              if (text.dataset.phaseId == data.phase_id) {
                text.innerText = data.phase_progress + "%";
              }
            });
            const title = document.querySelector(
              `.task-title[data-task-id="${taskId}"]`,
            );

            if (title) {
              if (data.status === "completed") {
                title.classList.add(
                  "text-decoration-line-through",
                  "text-muted",
                );
              } else {
                title.classList.remove(
                  "text-decoration-line-through",
                  "text-muted",
                );
              }
            }
          });
      });
    });
  });
</script>
