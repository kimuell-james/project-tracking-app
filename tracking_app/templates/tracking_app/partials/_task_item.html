<div id="collapse{{ phase.id }}" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
    <div class="accordion-body">
        <input class="form-check-input" type="checkbox" {% if task.completed %}checked{% endif %}>

        <span class="fw-semibold">{{ task.title }}</span>

        <span class="text-muted">|</span>

        <span class="text-muted small">{{ task.description }}</span>
    </div>
</div>
