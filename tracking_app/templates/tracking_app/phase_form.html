{% extends 'tracking_app/main.html' %} {% block content %}

<div class="">
  <h1>Phase</h1>
  <hr />

  <div>
    <table id="phaseTable" class="table table-striped table-hover text-center">
      <thead>
        <tr>
          <th>No.</th>
          <th>Event</th>
        </tr>
      </thead>
      <tbody>
        {% for event in events %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>
            <a href="" class="phase-name">Phase</a
            >
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="6">No events available.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const table = new DataTable("#phaseTable");
  });
</script>

{% endblock %}
